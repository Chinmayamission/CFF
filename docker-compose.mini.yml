  # CFF Application (frontend + backend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_POOL_ID: ${USER_POOL_ID:-}
        COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID:-}
        GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
        MODE: ${MODE:-dev}
    container_name: cff-app
    ports:
      - "8000:8000"
    env_file:
      - .env.mini
    # depends_on:
    #   mongodb:
